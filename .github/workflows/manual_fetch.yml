name: Manual Fetch Activity

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: '取得対象の日付 (YYYY-MM-DD)'
        required: true
        default: '2026-05-23'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install stravalib

      - name: Run script for target date
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python main.py ${{ github.event.inputs.target_date }}

      - name: Upload Activity Data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: activity-${{ github.event.inputs.target_date }}
          path: data/*.json
          retention-days: 7
